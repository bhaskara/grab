# Nixpacks configuration for Railway deployment.
# Ensures both Python and Node.js runtimes are available.
# Nixpacks auto-detects Python from requirements.txt but misses Node.js
# since web/package.json is in a subdirectory.

[phases.setup]
nixPkgs = ["python313", "nodejs_20"]

[phases.install]
cmds = ["pip install -r requirements.txt"]
