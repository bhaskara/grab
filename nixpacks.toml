# Nixpacks configuration for Railway deployment.
# Nixpacks auto-detects Python from requirements.txt and sets up
# pip/venv automatically. We only need to add Node.js explicitly
# since web/package.json is in a subdirectory and won't be detected.

[phases.setup]
nixPkgs = ["nodejs_20"]

# No [phases.install] — let Nixpacks handle Python/pip setup automatically.
# The buildCommand in railway.json handles the React build step.
